name: spec-sync

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch: {}

jobs:
  regenerate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install codegen tooling
        run: pip install -r codegen/requirements.txt
      - name: Regenerate Python client
        run: bash codegen/generate-python.sh
      - name: Detect drift
        id: drift
        run: |
          if git diff --quiet -- sdk/python/src/truagents/generated; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Open pull request on drift
        if: steps.drift.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          branch: chore/spec-sync
          commit-message: "chore(spec-sync): regenerate Python client from truagents.json"
          title: "chore(spec-sync): regenerate Python client from truagents.json"
          body: |
            Nightly spec sync detected drift between the checked-in generated
            tree and the live OpenAPI spec at
            `https://docs.truagents.com/openapi/truagents.json`. Review the diff
            before merging.
          add-paths: sdk/python/src/truagents/generated
