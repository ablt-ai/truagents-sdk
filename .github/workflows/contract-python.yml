name: contract-python

# In-workflow path gating: `changes` classifies the diff via dorny/paths-filter;
# downstream jobs self-gate. Singular-name jobs (license-hash, contract) use
# job-level `if:` — GitHub reports a skipped static-name job as success, so
# branch protection is satisfied on skips. Matrix jobs (unit) MUST use
# step-level `if:`: a job-level skip on a matrix yields a check with the
# un-expanded template name, and branch protection waits forever for the
# expanded ones. See https://docs.github.com/en/actions/using-jobs/using-conditions-to-control-job-execution

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: "0 3 * * *"

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      # Fallback to 'true' when the dorny step is skipped (push / schedule).
      relevant: ${{ steps.f.outputs.relevant || 'true' }}
    steps:
      - if: github.event_name == 'pull_request'
        uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706  # v4.0.2
        id: f
        with:
          filters: |
            relevant:
              - 'sdk/python/**'
              - 'codegen/**'
              - '.github/workflows/contract-python.yml'
              - 'LICENSE'

  license-hash:
    needs: changes
    if: needs.changes.outputs.relevant == 'true'
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
      - name: Verify LICENSE SHA256
        run: |
          echo "cfc7749b96f63bd31c3c42b5c471bf756814053e847c10f3eb003417bc523d30  LICENSE" | sha256sum -c -

  unit:
    needs: changes
    runs-on: ubuntu-latest
    permissions: {}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - if: needs.changes.outputs.relevant == 'true'
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
      - if: needs.changes.outputs.relevant == 'true'
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97  # v7.0.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install SDK with dev extras
        if: needs.changes.outputs.relevant == 'true'
        working-directory: sdk/python
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'
      - name: Ruff
        if: needs.changes.outputs.relevant == 'true'
        working-directory: sdk/python
        run: ruff check src tests examples
      - name: Ruff format check
        if: needs.changes.outputs.relevant == 'true'
        working-directory: sdk/python
        run: ruff format --check src tests examples
      - name: Pyright
        if: needs.changes.outputs.relevant == 'true'
        working-directory: sdk/python
        run: pyright src
      - name: Unit tests
        if: needs.changes.outputs.relevant == 'true'
        working-directory: sdk/python
        run: pytest tests/unit -v

  contract:
    runs-on: ubuntu-latest
    needs: [changes, unit]
    environment: dev
    permissions: {}
    if: >-
      needs.changes.outputs.relevant == 'true' &&
      (github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name == github.repository)
    env:
      CLIENT_ID: ${{ vars.CLIENT_ID }}
      CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
      BASE_URL: ${{ vars.BASE_URL || 'https://api.dev-truagents.com' }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97  # v7.0.0
        with:
          python-version: "3.12"
      - name: Install SDK with dev extras
        working-directory: sdk/python
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'
      - name: Contract tests
        working-directory: sdk/python
        run: pytest tests/contract -v
