name: tag-release

on:
  pull_request:
    types: [closed]
    branches: [main]

jobs:
  auto-tag:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    if: >-
      github.event.pull_request.merged == true &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      startsWith(github.event.pull_request.head.ref, 'release/sdk-python-v')
    steps:
      - name: Generate token for GitHub app
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1  # v3.2.0
        with:
          app-id: ${{ secrets.PROJEN_APP_ID }}
          private-key: ${{ secrets.PROJEN_APP_PRIVATE_KEY }}

      - name: Checkout merge commit
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
        with:
          token: ${{ steps.app-token.outputs.token }}
          ref: ${{ github.event.pull_request.merge_commit_sha }}
          fetch-depth: 0

      - name: Extract and validate version
        env:
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          VERSION="${HEAD_REF#release/sdk-python-v}"
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(\.dev[0-9]+|\.rc[0-9]+|\.post[0-9]+)?$ ]]; then
            echo "tag-release: extracted version '$VERSION' is not PEP 440 compliant" >&2
            exit 1
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Create and push tag
        env:
          MERGE_SHA: ${{ github.event.pull_request.merge_commit_sha }}
        run: |
          TAG="sdk-python-v${VERSION}"
          git tag -a "$TAG" "$MERGE_SHA" -m "Release v${VERSION}"
          git push origin "$TAG"

      - name: Comment on PR
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          WORKFLOW_URL: ${{ github.server_url }}/${{ github.repository }}/actions/workflows/release-python.yml
        run: |
          gh pr comment "$PR_NUMBER" --body "Tag \`sdk-python-v${VERSION}\` created and pushed on the merge commit. Watch [release-python.yml](${WORKFLOW_URL}) for build and publish status."
